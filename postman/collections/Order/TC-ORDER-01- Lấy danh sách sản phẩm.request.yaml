name: "TC-ORDER-01: Lấy danh sách sản phẩm"
url: "{{baseUrl}}/api/product/v1/san-pham"
method: GET
scripts:
  - type: afterResponse
    code: "pm.test(\"Status 200\", () => pm.response.to.have.status(200));\r

