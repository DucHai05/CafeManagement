name: Java CI with Gradle (Auto Test)

# 1. Định nghĩa sự kiện kích hoạt luồng CI
on:
  push:
    branches: [ "main" ] # Kích hoạt khi có commit push lên nhánh main
  pull_request:
    branches: [ "main" ] # Kích hoạt khi có một Pull Request trỏ vào nhánh main

jobs:
  build-and-test:
    # Chạy luồng CI trên hệ điều hành Ubuntu mới nhất do GitHub cấp
    runs-on: ubuntu-latest

    steps:
    # Bước 1: Kéo code từ kho lưu trữ GitHub về máy ảo CI
    - name: Checkout source code
      uses: actions/checkout@v4

    # Bước 2: Khởi tạo và cài đặt môi trường Java 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin' # Sử dụng bản phân phối Eclipse Temurin ổn định

    # Bước 3: Cấu hình và tối ưu hóa bộ nhớ đệm (Cache) cho Gradle
    # Giúp các lần chạy test sau nhanh hơn vì không phải tải lại các thư viện dependency từ đầu
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # Bước 4: Cấp quyền thực thi cho file gradlew trên máy ảo Linux của GitHub
    - name: Grant execute permission for gradlew
      run: chmod +x ./cafe-service-user/gradlew
      # Lưu ý: Thay đổi đường dẫn "./cafe-service-user/gradlew" nếu cấu trúc thư mục của bạn khác.
      # Nếu file gradlew nằm ngay thư mục gốc, chỉ cần ghi: chmod +x gradlew

    # Bước 5: Chạy các bài test tự động
    - name: Run Tests with Gradle
      run: |
        cd ./cafe-service-user
        ./gradlew test