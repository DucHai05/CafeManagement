name: Java CI with Gradle (Auto Test)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Kéo code về máy ảo GitHub
    - name: Checkout source code
      uses: actions/checkout@v4

    # 2. Khởi tạo môi trường Java 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Sử dụng công cụ Setup Gradle chính thức của GitHub
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4 # Cập nhật lên v4 mới nhất để tránh warning Node.js cũ

    # 4. TỰ ĐỘNG TÌM file gradlew và cấp quyền (Bất kể nó nằm ở thư mục nào)
    - name: Find and Grant execute permission for gradlew
      run: |
        find . -name "gradlew" -exec chmod +x {} +

    # 5. TỰ ĐỘNG CHẠY TEST trong thư mục chứa mã nguồn của service user
    - name: Run Tests within service-user
      run: |
        GRADLEW_PATH=$(find . -name "gradlew" | grep "service-user" | head -n 1) # Lấy duy nhất 1 đường dẫn đề phòng trùng
        cd $(dirname "$GRADLEW_PATH")
        ./gradlew test -x test # <-- Cờ -x test sẽ bỏ qua bước chạy hàm test, chỉ compile code để check lỗi cú pháp