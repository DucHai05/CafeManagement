name: Java CI with Gradle (Multi-Services Auto Test)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ================= JOB 1: CHẠY MA TRẬN CHO BACKEND =================
  backend:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service: [
          "ServiceAPIGateway",
          "ServiceEurekaServer",
          "ServiceUser",
          "ServiceCafe",
          "ServiceProduct",
          "ServiceStore",
          "ServiceTable",
          "ServiceSalary",
          "ServiceDoanhThu",
          "ServicePromotion",
          "ServiceNotification"
        ]
      fail-fast: false

    name: Build ${{ matrix.service }}

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Compile and Verify ${{ matrix.service }}
      uses: gradle/actions/setup-gradle@v4
      with:
        arguments: assemble
        build-root-directory: ./${{ matrix.service }}

  # ================= JOB 2: CHẠY CHO FRONTEND REACTJS =================
  frontend-ci: # <-- Đã căn lề thẳng hàng hoàn toàn với chữ backend ở trên
    runs-on: ubuntu-latest
    name: Build Frontend ReactJS
    
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install and Build Frontend
      working-directory: ./Frontend 
      run: |
        npm install
        npm run build