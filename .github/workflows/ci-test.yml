name: Java CI with Gradle (Multi-Services Auto Test)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    # Định nghĩa ma trận danh sách tất cả các service của bạn
    strategy:
      matrix:
        service: [
          "ServiceAPIGateway",
          "ServiceEurekaServer",
          "ServiceUser",
          "ServiceCafe",
          "ServiceProduct",
          "ServiceStore",
          "ServiceTable",
          "ServiceSalary",
          "ServiceDoanhThu",
          "ServicePromotion",
          "ServiceNotification"
        ]
      # Nếu 1 service fail, các service khác vẫn tiếp tục chạy không bị dừng lại
      fail-fast: false

    name: Build ${{ matrix.service }}

    steps:
    # 1. Kéo code về máy ảo
    - name: Checkout source code
      uses: actions/checkout@v4

    # 2. Cài đặt môi trường JDK 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Tự động nhảy vào từng thư mục dựa theo ma trận để biên dịch
    - name: Compile and Verify ${{ matrix.service }}
      uses: gradle/actions/setup-gradle@v4
      with:
        arguments: assemble
        build-root-directory: ./${{ matrix.service }}