name: Java CI with Gradle (Multi-Services Auto Test)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ================= JOB 1: BACKEND MATRIX =================
  backend:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service: [
          "ServiceAPIGateway",
          "ServiceEurekaServer",
          "ServiceUser",
          "ServiceCafe",
          "ServiceProduct",
          "ServiceStore",
          "ServiceTable",
          "ServiceSalary",
          "ServiceDoanhThu",
          "ServicePromotion",
          "ServiceNotification"
        ]
      fail-fast: false

    name: Build ${{ matrix.service }}

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Bước 3: Chỉ khởi tạo môi trường Gradle thuần túy tại thư mục gốc
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # Bước 4: Di chuyển vào thư mục con và thực thi lệnh biên dịch chính thức
    - name: Compile and Verify ${{ matrix.service }}
      working-directory: ./${{ matrix.service }} # Ép máy ảo đứng tại thư mục service này để chạy lệnh
      run: |
        chmod +x ./gradlew
        ./gradlew assemble

  # ================= JOB 2: FRONTEND =================
  frontend-ci:
    runs-on: ubuntu-latest
    name: Build Frontend ReactJS
    
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install and Build Frontend
      working-directory: ./Frontend 
      run: |
        npm install
        npm run build