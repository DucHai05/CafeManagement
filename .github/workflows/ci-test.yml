name: Java CI with Gradle (Auto Test)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Kéo code về máy ảo GitHub
    - name: Checkout source code
      uses: actions/checkout@v4

    # 2. Khởi tạo môi trường Java 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Sử dụng công cụ Setup Gradle chính thức của GitHub
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4 # Cập nhật lên v4 mới nhất để tránh warning Node.js cũ

    # 4. TỰ ĐỘNG TÌM file gradlew và cấp quyền (Bất kể nó nằm ở thư mục nào)
    - name: Find and Grant execute permission for gradlew
      run: |
        find . -name "gradlew" -exec chmod +x {} +

    # 5. TỰ ĐỘNG CHẠY TEST trong thư mục chứa mã nguồn của service user
    - name: Run Tests within service-user
      run: |
        # Lệnh này sẽ tự động tìm đến đúng thư mục chứa gradlew của service-user và thực thi test
        # Đảm bảo lệnh hoạt động ngay cả khi bạn đặt tên thư mục là cafe-service-user hay trunk-service-user...
        GRADLEW_PATH=$(find . -name "gradlew" | grep "service-user")
        if [ -z "$GRADLEW_PATH" ]; then
          echo "❌ Không tìm thấy thư mục service-user nào chứa file gradlew!"
          exit 1
        fi
        cd $(dirname "$GRADLEW_PATH")
        ./gradlew test