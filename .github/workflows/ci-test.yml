name: Java CI with Gradle (Auto Test)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    # Máy ảo chạy CI của GitHub (mặc định là Linux để tối ưu tốc độ)
    runs-on: ubuntu-latest

    steps:
    # 1. Kéo code từ GitHub về
    - name: Checkout source code
      uses: actions/checkout@v4

    # 2. Cài đặt Java 17 cho máy ảo
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Tối ưu hóa và chạy Gradle bằng Action chính chủ của GitHub
    # Action này tự động cấp quyền thực thi (chmod +x) cho file gradlew luôn, 
    # bạn không cần gõ lệnh cấp quyền thủ công nữa.
    with:
      arguments: assemble
      # Chỉ định chính xác thư mục chứa service-user tính từ gốc repo.
      # Bạn hãy thay "cafe-service-user" bằng tên thư mục chuẩn trên Windows của bạn nhé.
      build-root-directory: ./cafe-service-user 
      uses: gradle/actions/setup-gradle@v4