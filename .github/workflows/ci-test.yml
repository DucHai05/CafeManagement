name: Java CI/CD with Gradle & Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ================= JOB 1: BACKEND CI/CD =================
  backend:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service: [
          "ServiceAPIGateway",
          "EurekaServer",
          "ServiceUser",
          "ServiceCafe",
          "ServiceProduct",
          "ServiceStore",
          "ServiceTable",
          "ServiceSalary",
          "ServiceDoanhThu",
          "ServicePromotion",
          "ServiceNotification"
        ]
      fail-fast: false

    name: Build & Push -> ${{ matrix.service }}

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # --- PHẦN 1: CI - ĐỊNH VỊ VÀ BIÊN DỊCH CODE ---
    - name: Compile Java Code
      id: compile-step
      run: |
        TARGET_NAME=$(echo "${{ matrix.service }}" | tr '[:upper:]' '[:lower:]')
        GRADLEW_PATH=$(find . -iname "gradlew" | grep -i "$TARGET_NAME" | head -n 1)
        if [ -z "$GRADLEW_PATH" ]; then
          echo "❌ Không tìm thấy thư mục của service: ${{ matrix.service }}"
          exit 1
        fi
        
        # Lưu đường dẫn thư mục thực tế vào biến môi trường để bước sau dùng lại
        SRC_DIR=$(dirname "$GRADLEW_PATH")
        echo "SERVICE_DIR=$SRC_DIR" >> $GITHUB_ENV
        
        cd $SRC_DIR
        chmod +x ./gradlew
        ./gradlew assemble

    # --- PHẦN 2: CD - TỰ ĐỘNG BUILD DOCKER IMAGE & PUSH ---
    # 1. Đăng nhập vào Docker Hub bằng tài khoản đã giấu trong Secrets
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 2. Thực hiện Build Docker Image dựa vào Dockerfile có sẵn trong thư mục service
    - name: Build and Push Docker Image
      run: |
        # Chuyển tên service thành chữ thường để đặt tên Image đúng chuẩn Docker (Docker không cho viết hoa tên Image)
        IMAGE_NAME=$(echo "${{ matrix.service }}" | tr '[:upper:]' '[:lower:]')
        
        # Di chuyển vào đúng thư mục chứa Dockerfile của service đó để build
        cd ${{ env.SERVICE_DIR }}
        
        # Tiến hành build và tag Image với tên tài khoản của bạn
        docker build -t ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest .
        
        # Đẩy Image lên Docker Hub công khai
        docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest
        
# ================= JOB 2: FRONTEND CI/CD =================
  frontend-ci:
    runs-on: ubuntu-latest
    name: Build & Push Frontend ReactJS
    
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install and Build Frontend
      working-directory: ./Frontend 
      run: |
        npm install
        npm run build

    # --- THÊM PHẦN CD CHO FRONTEND Ở ĐÂY ---
    # 1. Đăng nhập vào Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 2. Build Docker Image cho Frontend và đẩy lên với tên repo: frontend
    - name: Build and Push Frontend Docker Image
      run: |
        # Di chuyển vào thư mục Frontend chứa Dockerfile
        cd ./Frontend
        
        # Tiến hành build image đặt tên là frontend
        docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:latest .
        
        # Đẩy lên Docker Hub
        docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest