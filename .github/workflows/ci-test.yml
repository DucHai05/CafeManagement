name: Java CI with Gradle (Auto Test)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Kéo code về máy ảo
    - name: Checkout source code
      uses: actions/checkout@v4

    # 2. Cài đặt môi trường JDK 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Chạy lệnh assemble của Gradle sử dụng Action chính chủ
    - name: Compile and Verify Code Structure
      uses: gradle/actions/setup-gradle@v4
      with:
        arguments: assemble
        build-root-directory: ./ServiceUser # <-- Đảm bảo viết đúng tên thư mục trên Windows của bạn nhé